{% extends "base.html" %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; overflow:hidden;">
  <!-- Elegant background glow blob -->
  <div style="position:absolute; width:350px; height:350px; background:radial-gradient(circle, rgba(224,94,53,0.1), transparent 70%); filter:blur(80px); top:20%; left:30%; z-index:-1; pointer-events:none;"></div>
  
  <div class="modal" style="width:380px; box-shadow:var(--shadow-lg); border:1px solid var(--line); background:var(--bg-elev); animation:scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); position:relative; z-index:2;">
    <div style="background:var(--accent-soft); width:48px; height:48px; border-radius:12px; display:grid; place-items:center; font-size:20px; color:var(--accent); margin-bottom:8px;">🔒</div>
    <div class="modal-title" style="margin-bottom:4px;">Admin sign-in required</div>
    <p style="font-size:13.5px; color:var(--ink-muted); line-height:1.6; margin:0 0 16px;">Enter the admin token configured in your <code>.env</code> configuration file.</p>
    
    <form method="post" action="/admin/login" style="display:flex; flex-direction:column; gap:14px; width:100%;">
      <input type="password" name="token" placeholder="Admin token" autofocus style="width:100%; height:42px;">
      <button class="btn btn-orange" style="width:100%; height:42px; font-weight:600; font-size:14px;" type="submit">Sign in →</button>
    </form>
  </div>
</div>
{% endblock %}
