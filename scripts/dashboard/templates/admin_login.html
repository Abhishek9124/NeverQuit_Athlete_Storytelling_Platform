{% extends "base.html" %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div class="modal" style="max-width:380px;">
    <div style="background:var(--accent-soft); width:44px; height:44px; border-radius:var(--r-lg); display:grid; place-items:center; font-size:18px; color:var(--accent);">🔒</div>
    <div class="modal-title">Admin sign-in required</div>
    <p style="font-size:13.5px; color:var(--ink-2); line-height:1.6; margin:0;">Enter the admin token configured in your <code>.env</code> file.</p>
    <form method="post" action="/admin/login" style="display:flex; flex-direction:column; gap:14px; width:100%;">
      <input type="password" name="token" placeholder="Admin token" autofocus style="width:100%; height:42px;">
      <button class="btn btn-orange" style="width:100%; height:42px;" type="submit">Sign in →</button>
    </form>
  </div>
</div>
{% endblock %}
