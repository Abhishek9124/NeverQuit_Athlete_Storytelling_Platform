{% extends "base.html" %}
{% block title %}{{ s.athlete_name }} · {{ site }}{% endblock %}
{% block head_meta %}
<meta name="description" content="{{ meta.description }}">
<link rel="canonical" href="{{ meta.url }}">
<meta property="og:site_name" content="{{ site }}">
<meta property="og:type" content="article">
<meta property="og:title" content="{{ meta.title }}">
<meta property="og:description" content="{{ meta.description }}">
<meta property="og:url" content="{{ meta.url }}">
{% if meta.image %}<meta property="og:image" content="{{ meta.image }}">{% endif %}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ meta.title }}">
<meta name="twitter:description" content="{{ meta.description }}">
{% if meta.image %}<meta name="twitter:image" content="{{ meta.image }}">{% endif %}
<link rel="stylesheet" href="/static/css/reader.css?v=2">
{% block reader_extra %}{% endblock %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ meta.title|tojson }},
  "description": {{ meta.description|tojson }},
  {% if meta.image %}"image": {{ meta.image|tojson }},{% endif %}
  "url": {{ meta.url|tojson }},
  "about": {{ (meta.sport or "Sport")|tojson }},
  "publisher": { "@type": "Organization", "name": {{ site|tojson }} },
  "mainEntity": { "@type": "Person", "name": {{ meta.athlete|tojson }} }
}
</script>
{% endblock %}
{% block content %}
{% include "_story_body.html" %}
{% endblock %}
