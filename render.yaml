services:
  - type: web
    name: neverquit
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ADMIN_TOKEN
        generateValue: true
      - key: FLASK_SECRET
        generateValue: true
    disk:
      name: neverquit-data
      mountPath: /app/data
      sizeGB: 1
